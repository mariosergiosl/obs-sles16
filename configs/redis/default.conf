# =============================================================================
# /etc/redis/default.conf — Configuração Redis (Instância @default)
# =============================================================================
# Baseado no template /etc/redis/redis.default.conf.template do SLES 16.
#
# Instalação:
#   cp configs/redis/default.conf /etc/redis/default.conf
#   chown redis:redis /etc/redis/default.conf
#   systemctl restart redis@default.service
#
# Nota: No SLES 16, o Redis usa instâncias systemd (redis@.service).
# O serviço é redis@default.service, que carrega /etc/redis/default.conf.
# Não existe redis.service — tentativas de ativá-lo resultam em erro.
# =============================================================================

# Bind apenas no loopback (lab)
# Em produção com Redis dedicado: ajuste para o IP da interface de rede interna
bind 127.0.0.1 ::1

# Porta padrão
port 6379

# Timeout de conexão inativa (0 = sem timeout)
timeout 0

# Proteção contra execução acidental em modo daemon direto
# (o systemd gerencia o ciclo de vida)
daemonize no

# Nível de log: debug, verbose, notice, warning
loglevel notice

# Log para stdout (capturado pelo journald via systemd)
logfile ""

# Número de bancos de dados
databases 16

# =============================================================================
# PRODUÇÃO: Descomente e ajuste as seções abaixo
# =============================================================================

# Persistência AOF (Append Only File) — recomendada em produção
# appendonly yes
# appendfilename "appendonly.aof"
# appendfsync everysec
# no-appendfsync-on-rewrite no
# auto-aof-rewrite-percentage 100
# auto-aof-rewrite-min-size 64mb

# Persistência RDB (snapshots) — alternativa ao AOF
# save 900 1
# save 300 10
# save 60 10000

# Autenticação — obrigatória em produção
# requirepass <SENHA-FORTE>

# Limite de memória (ajuste conforme RAM disponível no nó)
# maxmemory 2gb
# maxmemory-policy allkeys-lru

# Bind para rede interna (produção — nó dedicado)
# bind <IP-INTERFACE-INTERNA>
