# =============================================================================
# /etc/apache2/conf.d/passenger.conf — Declaração do Módulo Phusion Passenger
# =============================================================================
# Destino: /etc/apache2/conf.d/passenger.conf
#
# Instalação:
#   cp configs/apache/passenger.conf /etc/apache2/conf.d/passenger.conf
#   apachectl configtest && systemctl reload apache2
#
# Contexto: SLES 16 + OBS Unstable + Ruby 3.4
# O pacote nativo exige apontamento explícito para locations.ini.
# =============================================================================

LoadModule passenger_module /usr/lib64/apache2/mod_passenger.so

<IfModule mod_passenger.c>
  # Caminho para o arquivo de localização do runtime do Passenger
  PassengerRoot /etc/passenger/locations.ini

  # Ruby padrão — ajustar conforme versão instalada no sistema
  # SLES 16 com OBS Unstable usa ruby3.4
  PassengerDefaultRuby /usr/bin/ruby.ruby3.4

  # ==========================================================================
  # PRODUÇÃO: Ajuste os parâmetros abaixo conforme RAM disponível no nó
  # ==========================================================================

  # Número máximo de processos Passenger (~150-250 MB RAM cada)
  # PassengerMaxPoolSize 10

  # Número mínimo de instâncias sempre ativas (evita cold start)
  # PassengerMinInstances 2

  # Timeout de resposta da aplicação (segundos)
  # PassengerResponseBufferHighWatermark 0
</IfModule>
