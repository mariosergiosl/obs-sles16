# =============================================================================
# /etc/apache2/vhosts.d/obs.conf — VirtualHost do OBS (HTTP + HTTPS)
# =============================================================================
# Baseado no template fornecido pelo pacote obs-api no SLES 16.
# Diretivas depreciadas foram comentadas; DocumentRoot corrigido para Passenger.
#
# Instalação:
#   cp configs/apache/obs-vhost.conf /etc/apache2/vhosts.d/obs.conf
#   apachectl configtest && systemctl reload apache2
#
# Pré-requisitos:
#   - Módulos habilitados: ssl, headers, rewrite, proxy, proxy_http, passenger
#   - Certificado TLS presente em /srv/obs/certs/ com contexto SELinux cert_t
#   - passenger.conf presente em /etc/apache2/conf.d/
# =============================================================================

# -----------------------------------------------------------------------------
# VirtualHost HTTP — Redireciona para HTTPS
# -----------------------------------------------------------------------------
<VirtualHost *:80>
  ServerName sles16BBOBS.lab
  # Em produção: substitua pelo FQDN real do servidor
  # ServerName obs.empresa.internal

  RewriteEngine On
  RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# -----------------------------------------------------------------------------
# VirtualHost HTTPS — Aplicação Principal
# -----------------------------------------------------------------------------
<VirtualHost *:443>
  ServerName sles16BBOBS.lab
  # Em produção: substitua pelo FQDN real do servidor
  # ServerName obs.empresa.internal

  # Phusion Passenger — ponto de entrada da aplicação Rails
  DocumentRoot /srv/www/obs/api/public

  # SSL/TLS
  SSLEngine on
  SSLCertificateFile    /srv/obs/certs/server.crt
  SSLCertificateKeyFile /srv/obs/certs/server.key

  # ==========================================================================
  # PRODUÇÃO: Habilite os parâmetros abaixo para TLS hardening
  # ==========================================================================
  # SSLProtocol TLSv1.2 TLSv1.3
  # SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
  # SSLHonorCipherOrder On
  # Header always set Strict-Transport-Security "max-age=31536000"
  # SSLCertificateChainFile /srv/obs/certs/ca-chain.crt

  # Cabeçalhos de segurança
  Header always set X-Frame-Options SAMEORIGIN
  Header always set X-Content-Type-Options nosniff

  # Proxy reverso (usado internamente pelo OBS na porta 82)
  ProxyRequests Off

  # Diretório público da aplicação Rails (Passenger)
  <Directory /srv/www/obs/api/public>
    AllowOverride all
    Options -MultiViews
    Require all granted
  </Directory>

  # Logs
  ErrorLog  /var/log/apache2/obs_error.log
  CustomLog /var/log/apache2/obs_access.log combined

  # Diretivas depreciadas (comentadas — mantidas para referência histórica)
  # XForwardedFor ...
  # PassengerPreStart ...
</VirtualHost>
